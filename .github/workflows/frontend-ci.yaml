name: Frontend CI

on:
  push:
    branches:
      - main

jobs:

  build-app:
    runs-on: ubuntu-latest
    environment: kinder-ap-fe

    steps:

      - name: Print Hello
        run: echo "Hello World"

      - name: Print Second Message
        run: echo "This is the second jobbbbb"
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    environment: kinder-ap-fe
    needs: build-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/kinder-frontend:build-${{ github.run_number }} .

  docker-push:
    runs-on: ubuntu-latest
    environment: kinder-ap-fe
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/kinder-frontend:build-${{ github.run_number }}

      - name: Tag as Latest
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/kinder-frontend:build-${{ github.run_number }} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/kinder-frontend:latest

      - name: Push Latest Tag
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/kinder-frontend:latest